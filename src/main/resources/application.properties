spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.springframework.web=DEBUG
spring.datasource.hikari.data-source-properties.sslmode=require

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

supabase.jwt.secret=${SUPABASE_JWT_SECRET}
server.forward-headers-strategy=framework
server.port=${PORT:8080}

app.mail.sender=5bro.ecommerce@gmail.com
brevo.api.key=${BREVO_API_KEY}

supabase.url=${SUPABASE_URL}
supabase.anon.key=${SUPABASE_ANON_KEY}
supabase.service-role.key=${SUPABASE_SERVICE_ROLE_KEY:}

fpt.ai.api-key=${FPT_AI_API_KEY:}
fpt.ai.idr.endpoint=${FPT_AI_IDR_ENDPOINT:https://api.fpt.ai/vision/idr/vnm}
fpt.ai.api-key-header=${FPT_AI_API_KEY_HEADER:api_key}
fpt.ai.facematch.endpoint=${FPT_AI_FACEMATCH_ENDPOINT:https://api.fpt.ai/dmp/checkface/v1}
fpt.ai.facematch.api-key-header=${FPT_AI_FACEMATCH_API_KEY_HEADER:api_key}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# PayOS payment gateway
payos.client-id=${PAYOS_CLIENT_ID:DEMO_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY:DEMO_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:DEMO_CHECKSUM_KEY}
payos.return-url=${PAYOS_RETURN_URL:https://5bros.vercel.app/vendor/subscription/callback}
payos.cancel-url=${PAYOS_CANCEL_URL:https://5bros.vercel.app/vendor/san-pham}
